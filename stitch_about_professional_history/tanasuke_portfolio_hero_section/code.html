<style>

        }

        .md3-card {
            background-color: #25232a;transition: all 0.2s cubic-bezier(0.2, 0.0, 0, 1.0);

        }
        .gemini-spark {
            position: relative;
            display: inline-flex;
        }
        .gemini-spark::after {
            content: "✨";
            position: absolute;
            top: -10px;
            right: -14px;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #4aa5f0, #8e84f5, #e0889e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: spark-pulse 3s infinite ease-in-out;

        }

            0% { transform: scale(0.8) rotate(0deg); opacity: 0.6; }

            100% { transform: scale(0.8) rotate(0deg); opacity: 0.6; }
